# Grafana Datasource — SimpleJSON protocol for Grafana
#
# Implements the Grafana SimpleJSON datasource protocol:
#   GET  /app-grafana/health     — connection test
#   POST /app-grafana/search     — list available metrics/tables
#   POST /app-grafana/query      — return time series or table data
#   POST /app-grafana/annotations — return annotations

type DatasourceConfig @table(database: "app-grafana") @export {
    id: ID! @primaryKey              # "default"
    baseUrl: String                  # yeti base URL (default http://127.0.0.1:9996)
    allowedApps: String              # JSON array of app_ids to expose (empty = all)
    timeField: String                # default time field name (default "createdAt")
}
